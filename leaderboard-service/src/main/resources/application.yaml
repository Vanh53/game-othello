spring:
  application:
    name: leaderboard-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/othello_db?currentSchema=schema_leaderboard}
    username: ${DB_USERNAME:leaderboard_service_acc}
    password: ${DB_PASSWORD:LeaderPassword@123}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: leaderboard-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.game.pvp_service.dto.event,com.game.leaderboard_service.dto.event"

server:
  port: 8083

jwt:
  signerKey: ${JWT_SIGNER_KEY:a5ec3c15e4118e3bf5be7f45a02434dd577a9397a3896e0634b4512148f05aa7}

kafka:
  topic:
    match-result: match-result

services:
  game-othello:
    url: ${GAME_OTHELLO_URL:http://localhost:8080}
