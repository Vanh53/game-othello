spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  application:
    name: ${LEADERBOARD_SERVICE_NAME:leaderboard-service}
  datasource:
    url: ${DB_URL_LEADERBOARD}
    username: ${DB_USERNAME_LEADERBOARD}
    password: ${DB_PASSWORD_LEADERBOARD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: ${LEADERBOARD_KAFKA_GROUP_ID:leaderboard-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ${KAFKA_TRUSTED_PACKAGES:com.game.pvp_service.dto.event,com.game.leaderboard_service.dto.event}

server:
  port: ${LEADERBOARD_SERVICE_PORT:8083}

jwt:
  signerKey: ${JWT_SIGNER_KEY}

kafka:
  topic:
    match-result: ${KAFKA_TOPIC_MATCH_RESULT:match-result}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}


