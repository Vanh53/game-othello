apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-service
  namespace: othello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaderboard-service
  template:
    metadata:
      labels:
        app: leaderboard-service
    spec:
      containers:
      - name: leaderboard-service
        image: leaderboard-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        env:
        - name: DB_URL
          value: "jdbc:postgresql://postgres-service:5432/othello_db?currentSchema=schema_leaderboard"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: othello-secrets
              key: LEADER_DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: othello-secrets
              key: LEADER_DB_PASSWORD
        - name: KAFKA_SERVERS
          value: "kafka-service:9092"
        - name: JWT_SIGNER_KEY
          valueFrom:
            secretKeyRef:
              name: othello-secrets
              key: JWT_SIGNER_KEY
        - name: GAME_OTHELLO_URL
          value: "http://identity-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-service
  namespace: othello
spec:
  selector:
    app: leaderboard-service
  ports:
  - port: 8083
    targetPort: 8083
