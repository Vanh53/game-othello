apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: othello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
        env:
        - name: GAME_OTHELLO_URL
          value: "http://identity-service:8080"
        - name: AI_MODEL_URL
          value: "http://ai-model-service:8082"
        - name: PVP_SERVICE_URL
          value: "http://pvp-service:8084"
        - name: LEADERBOARD_URL
          value: "http://leaderboard-service:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: othello
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8888
    targetPort: 8888
  type: ClusterIP
