spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  application:
    name: ${PVP_SERVICE_NAME:pvp-service}
  datasource:
    url: ${DB_URL_PVP}
    username: ${DB_USERNAME_PVP}
    password: ${DB_PASSWORD_PVP}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        type:
          preferred_uuid_jdbc_type: VARCHAR
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${PVP_SERVICE_PORT:8084}

jwt:
  signerKey: ${JWT_SIGNER_KEY}

kafka:
  topic:
    match-result: ${KAFKA_TOPIC_MATCH_RESULT:match-result}

services:
  identity-service:
    url: ${PVP_IDENTITY_SERVICE_URL}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${random.value}