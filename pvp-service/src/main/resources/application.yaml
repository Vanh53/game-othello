spring:
  application:
    name: pvp-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/othello_db?currentSchema=schema_pvp}
    username: ${DB_USERNAME:pvp_service_acc}
    password: ${DB_PASSWORD:PvpPassword@123}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        type:
          preferred_uuid_jdbc_type: VARCHAR
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8084

jwt:
  signerKey: ${JWT_SIGNER_KEY:a5ec3c15e4118e3bf5be7f45a02434dd577a9397a3896e0634b4512148f05aa7}

kafka:
  topic:
    match-result: match-result

services:
  game-othello:
    url: ${GAME_OTHELLO_URL:http://localhost:8080}
