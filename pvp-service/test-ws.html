<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        #log { background: #111; color: #0f0; padding: 10px; height: 300px; overflow-y: auto; }
        input, button { margin: 4px; padding: 6px; }
        input[type=text] { width: 400px; }
    </style>
</head>
<body>
    <h3>WebSocket STOMP Test</h3>

    <div>
        <input type="text" id="token" placeholder="Paste JWT token here" />
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    <div>
        <button onclick="joinMatchmaking()">Join Matchmaking (/app/game.join)</button>
        <button onclick="leaveGame()">Leave (/app/game.leave)</button>
    </div>
    <div>
        <input type="text" id="matchId" placeholder="matchId" style="width:200px"/>
        <input type="number" id="row" placeholder="row" style="width:60px"/>
        <input type="number" id="col" placeholder="col" style="width:60px"/>
        <button onclick="sendMove()">Send Move (/app/game.move)</button>
    </div>

    <h4>Log:</h4>
    <div id="log"></div>

    <script>
        let stompClient = null;

        function log(msg) {
            const el = document.getElementById('log');
            el.innerHTML += new Date().toLocaleTimeString() + ' → ' + msg + '<br>';
            el.scrollTop = el.scrollHeight;
        }

        function connect() {
            const token = document.getElementById('token').value.trim();
            const socket = new SockJS('http://localhost:8084/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = (msg) => log('🔍 STOMP: ' + msg);
            stompClient.connect(
                { Authorization: 'Bearer ' + token },
                function () {
                    log('✅ Connected');

                    // Subscribe nhận trạng thái game
                    stompClient.subscribe('/user/queue/game', function (msg) {
                        log('🎮 /queue/game: ' + msg.body);
                    });

                    // Subscribe nhận trạng thái matchmaking
                    stompClient.subscribe('/user/queue/status', function (msg) {
                        log('📋 /queue/status: ' + msg.body);
                    });

                    // Subscribe nhận lỗi
                    stompClient.subscribe('/user/queue/error', function (msg) {
                        log('❌ /queue/error: ' + msg.body);
                    });
                },
                function (err) {
                    log('❌ Connect error: ' + err);
                }
            );
        }

        function disconnect() {
            if (stompClient) { stompClient.disconnect(); log('🔌 Disconnected'); }
        }

        function joinMatchmaking() {
            stompClient.send('/app/game.join', {}, '{}');
            log('📤 Sent: /app/game.join');
        }

        function leaveGame() {
            const matchId = document.getElementById('matchId').value;
            stompClient.send('/app/game.leave', {}, JSON.stringify({ matchId }));
            log('📤 Sent: /app/game.leave');
        }

        function sendMove() {
            const matchId = document.getElementById('matchId').value;
            const row = parseInt(document.getElementById('row').value);
            const col = parseInt(document.getElementById('col').value);
            stompClient.send('/app/game.move', {}, JSON.stringify({ matchId, row, col }));
            log('📤 Sent move: row=' + row + ' col=' + col);
        }
    </script>
</body>
</html>
