services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.template.sql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    env_file:
      - ./.env
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    env_file:
      - ./.env
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Backend Services ─────────────────────────────────────────
  identity-service:
    build: ./identity-service
    env_file:
      - ./.env
    expose:
      - "${IDENTITY_SERVICE_PORT}"
    environment:
      DB_URL_IDENTITY: ${DB_URL_IDENTITY_DOCKER}
      DB_USERNAME_IDENTITY: ${DB_USERNAME_IDENTITY}
      DB_PASSWORD_IDENTITY: ${DB_PASSWORD_IDENTITY}
      EUREKA_URL: http://service-registry:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy

  ai-model-service:
    build: ./ai-model-service
    env_file:
      - ./.env
    expose:
      - "${AI_MODEL_SERVICE_PORT}"
    environment:
      DB_URL_AI_MODEL: ${DB_URL_AI_MODEL_DOCKER}
      DB_USERNAME_AI_MODEL: ${DB_USERNAME_AI_MODEL}
      DB_PASSWORD_AI_MODEL: ${DB_PASSWORD_AI_MODEL}
      EUREKA_URL: http://service-registry:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy

  pvp-service:
    build: ./pvp-service
    env_file:
      - ./.env
    expose:
      - "${PVP_SERVICE_PORT}"
    environment:
      DB_URL_PVP: ${DB_URL_PVP_DOCKER}
      DB_USERNAME_PVP: ${DB_USERNAME_PVP}
      DB_PASSWORD_PVP: ${DB_PASSWORD_PVP}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka/
      PVP_IDENTITY_SERVICE_URL: ${PVP_IDENTITY_SERVICE_URL_DOCKER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  leaderboard-service:
    build: ./leaderboard-service
    env_file:
      - ./.env
    expose:
      - "${LEADERBOARD_SERVICE_PORT}"
    environment:
      DB_URL_LEADERBOARD: ${DB_URL_LEADERBOARD_DOCKER}
      DB_USERNAME_LEADERBOARD: ${DB_USERNAME_LEADERBOARD}
      DB_PASSWORD_LEADERBOARD: ${DB_PASSWORD_LEADERBOARD}
      KAFKA_SERVERS: kafka:9092
      EUREKA_URL: http://service-registry:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    env_file:
      - ./.env
    ports:
      - "${API_GATEWAY_PORT}:8888"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_URL: http://service-registry:8761/eureka/
    depends_on:
      - identity-service
      - ai-model-service
      - pvp-service
      - leaderboard-service

  frontend:
    build:
      context: ./frontend/othello-frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_MEZON_CLIENT_ID: ${VITE_MEZON_CLIENT_ID}
        VITE_MEZON_AUTH_URL: ${VITE_MEZON_AUTH_URL}
        VITE_GOOGLE_AUTH_URL: ${VITE_GOOGLE_AUTH_URL}
    container_name: frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - api-gateway

  service-registry:
    build: ./service-registry
    container_name: service-registry
    env_file:
      - ./.env
    ports:
      - "${SERVICE_REGISTRY_PORT}:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  kafka_data:
